<svg viewBox="0 0 720 720" role="img" aria-label="MRG Claim Workflow — Discover → pack → intent → claim/run → submit (no payout) (workflow diagram)">
        <!-- Definitions -->
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="m-default" />
          </marker>
          <marker id="arrowhead-emphasis" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="m-emphasis" />
          </marker>
          <marker id="arrowhead-security" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="m-security" />
          </marker>
          <marker id="arrowhead-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="m-dashed" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" class="c-grid" stroke-width="0.5"/>
          </pattern>
        </defs>

        <!-- Background Grid -->
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- Swimlanes -->
        <rect x="40" y="52" width="640" height="104" rx="10" class="c-lane" stroke-width="1"/>
        <text x="54" y="74" class="t-dim" font-size="10" font-weight="600">01 / Discovery</text>

        <rect x="40" y="176" width="640" height="104" rx="10" class="c-lane" stroke-width="1"/>
        <text x="54" y="198" class="t-dim" font-size="10" font-weight="600">02 / Claim-block / Pack</text>

        <rect x="40" y="300" width="640" height="104" rx="10" class="c-lane" stroke-width="1"/>
        <text x="54" y="322" class="t-dim" font-size="10" font-weight="600">03 / Worker</text>

        <rect x="40" y="424" width="640" height="104" rx="10" class="c-lane" stroke-width="1"/>
        <text x="54" y="446" class="t-dim" font-size="10" font-weight="600">04 / Review path</text>

        <rect x="40" y="548" width="640" height="104" rx="10" class="c-lane" stroke-width="1"/>
        <text x="54" y="570" class="t-dim" font-size="10" font-weight="600">05 / Payout (out of scope)</text>

        <!-- Edge paths -->
        <path d="M 134 119 L 254 119" class="a-default" stroke-width="1.4" marker-end="url(#arrowhead)"/>
        <path d="M 300 145 L 300 166 L 300 166 L 300 209" class="a-emphasis" stroke-width="1.8" marker-end="url(#arrowhead-emphasis)"/>
        <path d="M 346 243 L 454 243" class="a-default" stroke-width="1.4" marker-end="url(#arrowhead)"/>
        <path d="M 500 269 L 500 290 L 346 290 L 346 367" class="a-security" stroke-width="1.4" marker-end="url(#arrowhead-security)"/>
        <path d="M 346 367 L 454 367" class="a-emphasis" stroke-width="1.8" marker-end="url(#arrowhead-emphasis)"/>
        <path d="M 500 393 L 500 414 L 500 414 L 500 465" class="a-emphasis" stroke-width="1.8" marker-end="url(#arrowhead-emphasis)"/>
        <path d="M 500 517 L 500 538 L 500 538 L 500 581" class="a-dashed" stroke-width="1.4" marker-end="url(#arrowhead-dashed)"/>

        <!-- Nodes -->
        <rect x="42" y="93" width="92" height="52" rx="6" class="c-mask"/>
        <rect x="42" y="93" width="92" height="52" rx="6" class="c-cloud" stroke-width="1.5"/>
        <text x="88" y="114" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">market</text>
        <text x="88" y="131" class="t-muted" font-size="8" text-anchor="middle">open bounties</text>

        <rect x="254" y="93" width="92" height="52" rx="6" class="c-mask"/>
        <rect x="254" y="93" width="92" height="52" rx="6" class="c-database" stroke-width="1.5"/>
        <text x="300" y="114" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">chain</text>
        <text x="300" y="131" class="t-muted" font-size="8" text-anchor="middle">token · proof · tip</text>

        <rect x="254" y="209" width="92" height="68" rx="6" class="c-mask"/>
        <rect x="254" y="209" width="92" height="68" rx="6" class="c-backend" stroke-width="1.5"/>
        <text x="300" y="230" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">split</text>
        <text x="300" y="247" class="t-muted" font-size="8" text-anchor="middle">work packs</text>
        <text x="300" y="265" class="t-backend" font-size="7" text-anchor="middle">job+review+audit</text>

        <rect x="454" y="217" width="92" height="52" rx="6" class="c-mask"/>
        <rect x="454" y="217" width="92" height="52" rx="6" class="c-security" stroke-width="1.5"/>
        <text x="500" y="238" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">intent</text>
        <text x="500" y="255" class="t-muted" font-size="8" text-anchor="middle">ledger_reference</text>

        <rect x="254" y="341" width="92" height="52" rx="6" class="c-mask"/>
        <rect x="254" y="341" width="92" height="52" rx="6" class="c-frontend" stroke-width="1.5"/>
        <text x="300" y="362" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">claim</text>
        <text x="300" y="379" class="t-muted" font-size="8" text-anchor="middle">--with-intent</text>

        <rect x="454" y="341" width="92" height="52" rx="6" class="c-mask"/>
        <rect x="454" y="341" width="92" height="52" rx="6" class="c-backend" stroke-width="1.5"/>
        <text x="500" y="362" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">run</text>
        <text x="500" y="379" class="t-muted" font-size="8" text-anchor="middle">host AI CLI</text>

        <rect x="454" y="465" width="92" height="52" rx="6" class="c-mask"/>
        <rect x="454" y="465" width="92" height="52" rx="6" class="c-frontend" stroke-width="1.5"/>
        <text x="500" y="486" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">submit</text>
        <text x="500" y="503" class="t-muted" font-size="8" text-anchor="middle">PR evidence</text>

        <rect x="454" y="581" width="92" height="68" rx="6" class="c-mask"/>
        <rect x="454" y="581" width="92" height="68" rx="6" class="c-security" stroke-width="1.5"/>
        <text x="500" y="602" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">accept</text>
        <text x="500" y="619" class="t-muted" font-size="8" text-anchor="middle">owner/admin only</text>
        <text x="500" y="637" class="t-security" font-size="7" text-anchor="middle">not by miner</text>

        <!-- Edge labels -->

        <rect x="268.6" y="146" width="62.8" height="14" rx="3" class="c-mask"/>
        <text x="300" y="156" class="t-backend" font-size="8" text-anchor="middle">tip + fleet</text>

        <rect x="416.4" y="280" width="53.199999999999996" height="14" rx="3" class="c-mask"/>
        <text x="443" y="290" class="t-security" font-size="8" text-anchor="middle">bind pack</text>

        <rect x="489" y="394" width="58" height="14" rx="3" class="c-mask"/>
        <text x="518" y="404" class="t-backend" font-size="8" text-anchor="middle">PR + notes</text>
        <rect x="488.2" y="518" width="67.6" height="14" rx="3" class="c-mask"/>
        <text x="522" y="528" class="t-database" font-size="8" text-anchor="middle">human review</text>

        <!-- Legend -->
        <text x="175" y="676" class="t-primary" font-size="10" font-weight="600">Legend</text>
        <rect x="175" y="688" width="14" height="9" rx="2" class="c-frontend" stroke-width="1"/>
        <text x="195" y="696" class="t-muted" font-size="7">User UI</text>
        <rect x="260" y="688" width="14" height="9" rx="2" class="c-backend" stroke-width="1"/>
        <text x="280" y="696" class="t-muted" font-size="7">Agent logic</text>
        <rect x="370" y="688" width="14" height="9" rx="2" class="c-security" stroke-width="1"/>
        <text x="390" y="696" class="t-muted" font-size="7">Policy</text>
        <rect x="455" y="688" width="14" height="9" rx="2" class="c-messagebus" stroke-width="1"/>
        <text x="475" y="696" class="t-muted" font-size="7">Tool action</text>
        <rect x="565" y="688" width="14" height="9" rx="2" class="c-database" stroke-width="1"/>
        <text x="585" y="696" class="t-muted" font-size="7">Context / trace</text>
      </svg>